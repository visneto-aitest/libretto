name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      selection_mode:
        description: Selection mode for WebVoyager
        required: true
        default: random
        type: choice
        options:
          - slice
          - random
      offset:
        description: Start offset for slice runs
        required: true
        default: "0"
        type: string
      count:
        description: Number of cases to run
        required: true
        default: "5"
        type: choice
        options:
          - "1"
          - "3"
          - "5"
          - "10"
      random_seed:
        description: Seed for random sampling
        required: true
        default: "1"
        type: string

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      ANTHROPIC_API_KEY: ${{ secrets.LIBRETTO_BENCHMARKS_ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Validate benchmark credentials
        run: |
          set -euo pipefail
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "LIBRETTO_BENCHMARKS_ANTHROPIC_API_KEY secret is required to run benchmarks." >&2
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium dependencies
        run: pnpm exec playwright install --with-deps chromium

      - name: Run benchmark
        id: run_benchmark
        env:
          SELECTION_MODE: ${{ inputs.selection_mode }}
          OFFSET: ${{ inputs.offset }}
          COUNT: ${{ inputs.count }}
          RANDOM_SEED: ${{ inputs.random_seed }}
        run: |
          set -euo pipefail

          cmd=(pnpm benchmarks webVoyager run --count "${COUNT}")
          if [ "${SELECTION_MODE}" = "random" ]; then
            cmd+=(--random --seed "${RANDOM_SEED}")
          else
            cmd+=(--offset "${OFFSET}")
          fi

          artifact_name="benchmark-webVoyager-${SELECTION_MODE}-transcripts"

          printf 'Running benchmark command:'
          printf ' %q' "${cmd[@]}"
          printf '\n'

          set +e
          "${cmd[@]}"
          exit_code=$?
          set -e

          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${artifact_name}" >> "$GITHUB_OUTPUT"

      - name: Add workflow summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "# WebVoyager Benchmark"
            echo
            printf -- '- Selection mode: `%s`\n' "${{ inputs.selection_mode }}"
            printf -- '- Offset: `%s`\n' "${{ inputs.offset }}"
            printf -- '- Count: `%s`\n' "${{ inputs.count }}"
            printf -- '- Random seed: `%s`\n' "${{ inputs.random_seed }}"
            printf -- '- Exit code: `%s`\n' "${{ steps.run_benchmark.outputs.exit_code }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark transcripts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.run_benchmark.outputs.artifact_name || format('benchmark-webVoyager-{0}-transcripts', inputs.selection_mode) }}
          if-no-files-found: warn
          path: |
            benchmarks/webVoyager/runs/**/prompt.md
            benchmarks/webVoyager/runs/**/transcript.jsonl
            benchmarks/webVoyager/runs/**/result.json

      - name: Fail workflow if benchmark failed
        if: always() && steps.run_benchmark.outputs.exit_code != '0'
        run: |
          echo "Benchmark command failed with exit code ${{ steps.run_benchmark.outputs.exit_code }}." >&2
          exit 1
