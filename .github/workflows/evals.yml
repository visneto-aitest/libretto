name: Evals

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "evals/**"
      - "scripts/summarize-evals.mjs"
      - "scripts/compare-eval-summary.mjs"
      - ".github/workflows/evals.yml"
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  actions: read

jobs:
  evals:
    if: |
      github.event_name != 'pull_request' ||
      startsWith(github.head_ref, 'tk-release-v') ||
      startsWith(github.event.pull_request.title, 'release:')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Validate eval credentials
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "ANTHROPIC_API_KEY secret is required to run evals." >&2
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run evals
        id: run_evals
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LIBRETTO_EVAL_SCORE_DIR: ${{ runner.temp }}/eval-scores
        run: |
          mkdir -p "${LIBRETTO_EVAL_SCORE_DIR}"
          pnpm eval

      - name: Summarize eval scores
        if: always()
        run: |
          node scripts/summarize-evals.mjs \
            "${RUNNER_TEMP}/eval-scores" \
            "${RUNNER_TEMP}/eval-summary.json" \
            > "${RUNNER_TEMP}/eval-summary.md"
          cat "${RUNNER_TEMP}/eval-summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload eval summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-summary
          path: |
            ${{ runner.temp }}/eval-summary.json
            ${{ runner.temp }}/eval-summary.md

      - name: Download baseline eval summary
        id: baseline
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          run_id="$(
            gh run list \
              --workflow evals.yml \
              --branch main \
              --event push \
              --status success \
              --limit 20 \
              --json databaseId \
              --jq '.[0].databaseId // ""'
          )"

          if [ -z "$run_id" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No successful main-branch eval baseline found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          mkdir -p "${RUNNER_TEMP}/baseline-eval"
          gh run download "$run_id" --name eval-summary --dir "${RUNNER_TEMP}/baseline-eval"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"

      - name: Compare against baseline
        id: compare
        if: always() && github.event_name == 'pull_request' && steps.baseline.outputs.found == 'true'
        continue-on-error: true
        run: |
          node scripts/compare-eval-summary.mjs \
            "${RUNNER_TEMP}/baseline-eval/eval-summary.json" \
            "${RUNNER_TEMP}/eval-summary.json" \
            5 \
            > "${RUNNER_TEMP}/eval-comparison.md"
          cat "${RUNNER_TEMP}/eval-comparison.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce eval success
        if: always()
        run: |
          if [ "${{ steps.run_evals.outcome }}" != "success" ]; then
            echo "Eval run failed." >&2
            exit 1
          fi

          if [ "${{ github.event_name }}" = "pull_request" ] && \
             [ "${{ steps.baseline.outputs.found }}" = "true" ] && \
             [ "${{ steps.compare.outcome }}" != "success" ]; then
            echo "Eval score drift exceeded the allowed +/-5% range." >&2
            exit 1
          fi
